# This CI job only runs on PRs where all other jobs are skipped.
# This allows Build Analysis to report green. Without this, no jobs would run,
# causing Build Analysis to hang indefinitely because it never receives an
# AzDO build.completed event (dotnet/arcade-services#6311).

# Only run this on PRs
trigger: none
# Run for all relevant branches, only on paths that no-op the other pipelines.
pr:
  autoCancel: true
  branches:
    include:
    - main
    - feature/*
    - release/*
  paths:
    include:
    - '**.md'
    - .github/*
    - docs/*
    - LICENSE
    - THIRD-PARTY-NOTICES.TXT

# ABG - Always Be Green
jobs:
  - job: Report_Green
    pool: server
    steps:
    # This is a documentation-only change. Use a no-op task to exit successfully.
    - task: Delay@1
      inputs:
        delayForMinutes: '0'
